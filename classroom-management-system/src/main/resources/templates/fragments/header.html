<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
  </head>

  <body>
    <header th:fragment="common-header">
      <nav class="navbar bg-white shadow-sm sticky-top">
        <div
          class="container-fluid px-3 d-flex flex-row align-items-center justify-content-between"
        >
          <div class="d-flex align-items-center">
            <button
              class="navbar-toggler border-0 p-0 me-2"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#sidebarMenu"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <a
              href="/trang-chu"
              class="navbar-brand mb-0 text-primary fw-bold p-0"
            >
              Hệ thống lớp học
            </a>
          </div>

          <div>
            <a href="/auth/login" class="btn btn-primary btn-sm px-3">
              Đăng nhập ngay !
            </a>
          </div>
        </div>
      </nav>

      <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header border-bottom">
          <h5 class="offcanvas-title text-primary fw-bold">Hệ thống lớp học</h5>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            data-bs-target="#sidebarMenu"
          ></button>
        </div>

        <div class="offcanvas-body">
          <div class="list-group list-group-flush">
            <a href="/trang-chu" class="list-group-item list-group-item-action">
              🏠 Trang chủ
            </a>

            <a href="/about" class="list-group-item list-group-item-action">
              ℹ️ Giới thiệu
            </a>

            <a href="/tin-tuc" class="list-group-item list-group-item-action">
              📰 Tin tức
            </a>

            <hr />

            <a
              href="/auth/login"
              class="list-group-item list-group-item-action"
            >
              🔑 Đăng nhập
            </a>

            <a
              href="/auth/register"
              class="list-group-item list-group-item-action"
            >
              📝 Đăng ký
            </a>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
