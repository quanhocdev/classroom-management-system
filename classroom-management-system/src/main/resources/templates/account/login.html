<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Hệ thống quản lý lớp học</title>

    <link rel="stylesheet" th:href="@{/css/fragments/header.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}" />

    <link rel="stylesheet" th:href="@{/css/account/login.css}" />
  </head>
  <body class="auth-body">
    <header th:replace="~{fragments/header :: common-header}"></header>

    <main class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Chào mừng quay trở lại</h2>
          <p>Vui lòng đăng nhập để tiếp tục vào hệ thống</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              placeholder="Nhập tên đăng nhập của bạn..."
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-submit">Đăng nhập</button>
        </form>

        <div id="message" class="auth-message"></div>

        <div class="auth-footer">
          <span>Chưa có tài khoản?</span>
          <a href="/auth/register">Đăng ký tài khoản mới</a>
        </div>
      </div>
    </main>

    <footer th:replace="~{fragments/footer :: common-footer}"></footer>

    <script th:src="@{/js/fragments/header.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
    <script th:src="@{/js/account/login.js}"></script>
  </body>
  Đ
</html>
