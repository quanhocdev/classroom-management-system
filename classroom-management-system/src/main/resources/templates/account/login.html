<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Hệ thống quản lý lớp học</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/fragments/header.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/account/login.css}" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: common-header}"></div>

    <main
      class="auth-wrapper d-flex align-items-center justify-content-center flex-grow-1 py-5"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            <div class="card auth-card border-0 shadow p-4 p-sm-5">
              <div class="auth-header text-center mb-4">
                <h2 class="fw-bold text-primary mb-2">
                  Chào mừng quay trở lại
                </h2>
                <p class="text-muted small">
                  Vui lòng đăng nhập để tiếp tục vào hệ thống
                </p>
              </div>

              <form id="loginForm" class="auth-form">
                <div class="mb-3">
                  <label
                    for="username"
                    class="form-label fw-semibold text-secondary"
                    >Tên đăng nhập</label
                  >
                  <input
                    type="text"
                    id="username"
                    class="form-control form-control-lg custom-input"
                    placeholder="Nhập tên đăng nhập của bạn..."
                    required
                  />
                </div>

                <div class="mb-4">
                  <label
                    for="password"
                    class="form-label fw-semibold text-secondary"
                    >Mật khẩu</label
                  >
                  <input
                    type="password"
                    id="password"
                    class="form-control form-control-lg custom-input"
                    placeholder="••••••••"
                    required
                  />
                </div>

                <button
                  type="submit"
                  class="btn btn-primary btn-lg w-100 fw-bold py-3 shadow-sm btn-submit"
                >
                  Đăng nhập
                </button>
              </form>

              <div
                id="message"
                class="auth-message mt-3 text-center fw-medium"
              ></div>

              <div class="auth-footer text-center mt-4 pt-3 border-top">
                <span class="text-muted small">Chưa có tài khoản?</span>
                <a
                  href="/auth/register"
                  class="text-primary fw-semibold small text-decoration-none ms-1 link-hover"
                >
                  Đăng ký tài khoản mới
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: common-footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/fragments/header.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
    <script th:src="@{/js/account/login.js}"></script>
  </body>
</html>
