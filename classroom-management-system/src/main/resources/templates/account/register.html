<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản - Hệ thống quản lý lớp học</title>

    <link rel="stylesheet" th:href="@{/css/fragments/header.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}" />

    <link rel="stylesheet" th:href="@{/css/account/register.css}" />
  </head>
  <body class="auth-body">
    <header th:replace="~{fragments/header :: common-header}"></header>

    <main class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Tạo tài khoản mới</h2>
          <p>Tham gia vào hệ thống quản lý lớp học ngay hôm nay</p>
        </div>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Nhập tên đăng nhập..."
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@gmail.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-submit">Đăng ký ngay</button>
        </form>

        <div id="message" class="auth-message"></div>

        <div class="auth-footer">
          <span>Bạn đã có tài khoản?</span>
          <a href="/auth/login">Đăng nhập tại đây</a>
        </div>
      </div>
    </main>

    <footer th:replace="~{fragments/footer :: common-footer}"></footer>

    <script th:src="@{/js/fragments/header.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
    <script th:src="@{/js/account/register.js}"></script>
  </body>
</html>
