<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ Giáo viên</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-teacher.css}" />
    <link rel="stylesheet" th:href="@{/css/teacher/trang-chu-teacher.css}" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: common-header}"></div>

    <div th:replace="~{fragments/sidebar-teacher :: sidebar}"></div>

    <div class="main-content d-flex flex-column flex-grow-1">
      <main class="container-fluid p-4 flex-grow-1">
        <div class="welcome-box p-4 rounded-3 text-white mb-4 shadow-sm">
          <h2 class="fw-bold mb-2 fs-3">
            Xin chào Thầy/Cô, <span id="teacherName">Giáo viên</span>!
          </h2>
          <p class="mb-0 opacity-90">
            Chào mừng đến với cổng thông tin quản lý giảng dạy và chấm điểm học
            sinh.
          </p>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-12 col-md-6">
            <div class="card h-100 border-0 shadow-sm status-card">
              <div
                class="card-body p-4 d-flex align-items-center justify-content-between"
              >
                <div>
                  <h6
                    class="text-uppercase text-muted fw-bold mb-2 small-title"
                  >
                    Lớp đang dạy
                  </h6>
                  <span class="fs-1 fw-bold text-success d-block">4 Lớp</span>
                </div>
                <div
                  class="icon-box bg-success-subtle text-success rounded-3 p-3 fs-2"
                >
                  🏫
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="card h-100 border-0 shadow-sm status-card">
              <div
                class="card-body p-4 d-flex align-items-center justify-content-between"
              >
                <div>
                  <h6
                    class="text-uppercase text-muted fw-bold mb-2 small-title"
                  >
                    Tổng số học sinh
                  </h6>
                  <span class="fs-1 fw-bold text-success d-block"
                    >120 Học sinh</span
                  >
                </div>
                <div
                  class="icon-box bg-success-subtle text-success rounded-3 p-3 fs-2"
                >
                  👶
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div th:replace="~{fragments/footer :: common-footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/fragments/header.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
    <script th:src="@{/js/fragments/sidebar-teacher.js}"></script>
    <script th:src="@{/js/teacher/trang-chu-teacher.js}"></script>
  </body>
</html>
