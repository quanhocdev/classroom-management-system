<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/trang-chu-admin.css}" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: common-header}"></div>

    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

    <div class="main-content d-flex flex-column flex-grow-1">
      <div class="container-fluid p-4 flex-grow-1">
        <div class="mb-4">
          <h1 class="text-dark fw-bold mb-1 fs-3">Tổng quan hệ thống</h1>
          <p class="text-muted mb-0">
            Chào mừng đến với trang quản trị hệ thống quản lý lớp học.
          </p>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-12 col-sm-6 col-lg-4">
            <div class="card h-100 border-0 shadow-sm custom-card card-blue">
              <div
                class="card-body p-4 d-flex align-items-center justify-content-between"
              >
                <div>
                  <h6
                    class="text-uppercase text-muted fw-bold mb-2 small-title"
                  >
                    Lớp học
                  </h6>
                  <span class="fs-1 fw-bold text-dark">12</span>
                </div>
                <div
                  class="icon-box bg-primary-subtle text-primary rounded-3 p-3"
                >
                  <span class="fs-3">🏫</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-4">
            <div class="card h-100 border-0 shadow-sm custom-card card-green">
              <div
                class="card-body p-4 d-flex align-items-center justify-content-between"
              >
                <div>
                  <h6
                    class="text-uppercase text-muted fw-bold mb-2 small-title"
                  >
                    Giáo viên
                  </h6>
                  <span class="fs-1 fw-bold text-dark">24</span>
                </div>
                <div
                  class="icon-box bg-success-subtle text-success rounded-3 p-3"
                >
                  <span class="fs-3">👨‍🏫</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-4">
            <div class="card h-100 border-0 shadow-sm custom-card card-cyan">
              <div
                class="card-body p-4 d-flex align-items-center justify-content-between"
              >
                <div>
                  <h6
                    class="text-uppercase text-muted fw-bold mb-2 small-title"
                  >
                    Học sinh
                  </h6>
                  <span class="fs-1 fw-bold text-dark">350</span>
                </div>
                <div class="icon-box bg-info-subtle text-info rounded-3 p-3">
                  <span class="fs-3">👶</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div th:replace="~{fragments/footer :: common-footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/fragments/header.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>
    <script th:src="@{/js/admin/trang-chu-admin.js}"></script>
  </body>
</html>
