<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Học sinh</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/quan-ly-hoc-sinh.css}" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Header -->
    <div th:replace="~{fragments/header :: common-header}"></div>

    <!-- Container chính chứa Sidebar và Vùng nội dung -->
    <div class="d-flex flex-grow-1 app-layout">
      <!-- Sidebar -->
      <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>

      <!-- Vùng nội dung chính (Co giãn động) -->
      <main class="main-content flex-grow-1 p-4">
        <div class="container-fluid">
          <!-- Tiêu đề trang -->
          <div
            class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-3"
          >
            <div>
              <h1 class="text-dark fw-bold mb-1 fs-3">Quản lý Học sinh</h1>
              <p class="text-muted mb-0">
                Quản lý thông tin tài khoản và danh sách các học sinh trong hệ
                thống.
              </p>
            </div>
            <button
              class="btn btn-primary shadow-sm"
              data-bs-toggle="modal"
              data-bs-target="#createStudentModal"
            >
              Tạo học sinh mới
            </button>
          </div>

          <!-- Bảng danh sách học sinh -->
          <div class="card border-0 shadow-sm custom-card">
            <div class="card-body p-4">
              <div class="table-responsive">
                <table
                  class="table table-hover align-middle mb-0"
                  id="studentTable"
                >
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Tên đăng nhập</th>
                      <th>Email</th>
                      <th>Trạng thái</th>
                      <th>Nguồn tạo</th>
                      <th class="text-end">Thao tác</th>
                    </tr>
                  </thead>
                  <tbody id="studentTableBody">
                    <!-- Dữ liệu sẽ được load tự động bằng JS từ API -->
                    <tr>
                      <td colspan="6" class="text-center py-4 text-muted">
                        <div
                          class="spinner-border spinner-border-sm me-2"
                          role="status"
                        ></div>
                        Đang tải danh sách học sinh...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: common-footer}"></div>

    <!-- MODAL TẠO HỌC SINH MỚI -->
    <div
      class="modal fade"
      id="createStudentModal"
      tabindex="-1"
      aria-labelledby="createStudentModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header border-bottom-0 pb-0">
            <h5
              class="modal-title fw-bold text-dark"
              id="createStudentModalLabel"
            >
              Tạo tài khoản học sinh
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <div
              id="modalAlert"
              class="alert d-none py-2 px-3 small mb-3"
              role="alert"
            ></div>
            <form id="createStudentForm">
              <div class="mb-3">
                <label
                  for="username"
                  class="form-label text-muted fw-semibold small"
                  >TÊN ĐĂNG NHẬP</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  required
                  placeholder="Nhập tên tài khoản học sinh..."
                />
              </div>
              <div class="mb-3">
                <label
                  for="email"
                  class="form-label text-muted fw-semibold small"
                  >EMAIL</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  required
                  placeholder="nhapemail@student.com"
                />
              </div>
              <div class="mb-3">
                <label
                  for="password"
                  class="form-label text-muted fw-semibold small"
                  >MẬT KHẨU BAN ĐẦU</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  required
                  placeholder="••••••••"
                />
              </div>
            </form>
          </div>
          <div class="modal-footer border-top-0 pt-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              Hủy
            </button>
            <button
              type="button"
              class="btn btn-primary px-4"
              id="btnSubmitStudent"
            >
              Đăng ký tài khoản
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/fragments/header.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>
    <script th:src="@{/js/admin/quan-ly-hoc-sinh.js}"></script>
  </body>
</html>
